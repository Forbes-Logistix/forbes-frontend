    <!--
      Default SEO metadata. Per-route values are injected by <Seo />
      (react-helmet-async) on the client. When prerender runs (locally),
      these defaults get replaced per route and baked into static HTML.
      On Vercel today, prerender is skipped — Helmet still updates these
      tags for crawlers that run JS (Google) and these defaults serve as
      the fallback for non-JS crawlers (Slack/iMessage link previews).
    -->
    <meta
      name="description"
      content="Driver-founded flatbed carrier in Jackson, MS hiring company drivers and owner-operators. Real pay, modern equipment, home most weekends."
    />
    <link rel="canonical" href="https://www.forbeslogistix.com/" />

    <meta property="og:title" content="Forbes Logistix &mdash; Flatbed driving jobs in the Southeast" />
    <meta
      property="og:description"
      content="Driver-founded flatbed carrier in Jackson, MS hiring company drivers and owner-operators. Real pay, modern equipment, home most weekends."
    />
    <meta property="og:image" content="https://www.forbeslogistix.com/forbesLogo.jpeg" />
    <meta property="og:url" content="https://www.forbeslogistix.com" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Forbes Logistix" />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- App Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap"
